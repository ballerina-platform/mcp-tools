openapi: "3.0.0"
info:
  title: Multi Query API
  version: "1.0.0"
servers:
  - url: http://localhost:9094
paths:
  /search:
    get:
      operationId: searchItems
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: true
          schema:
            type: integer
        - name: page_size
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
