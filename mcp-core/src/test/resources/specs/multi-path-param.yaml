openapi: "3.0.0"
info:
  title: Multi Path API
  version: "1.0.0"
servers:
  - url: http://localhost:9095
paths:
  /orgs/{orgId}/projects/{projectId}:
    get:
      operationId: getProject
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
