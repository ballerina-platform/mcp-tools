openapi: "3.0.0"
info:
  title: Ref Query Params API
  version: "1.0.0"
servers:
  - url: http://localhost:9096
paths:
  /pets:
    get:
      operationId: listPetsWithRefParams
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: OK
components:
  parameters:
    limit:
      name: limit
      in: query
      schema:
        type: integer
    offset:
      name: offset
      in: query
      schema:
        type: integer
